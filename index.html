<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presentazione Canzone</title>
    <style>
        /* Reset e Variabili globali */
        :root {
            --bg-color: #0b0c10;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --primary-color: #1db954; /* Verde Spotify */
            --primary-hover: #1ed760;
            --text-main: #f5f5f7;
            --text-muted: #a1a1a6;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top, #1c2a22 0%, #0b0c10 70%);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-font-smoothing: antialiased;
        }

        /* Header */
        header {
            text-align: center;
            padding: 40px 20px 30px 20px;
            width: 100%;
        }

        h1 {
            font-size: 2.2rem; /* Più compatto di base */
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff 0%, #b3b3b3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        h2 {
            font-size: 1.1rem; /* Più compatto di base */
            color: var(--primary-color);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Responsive Header per schermi grandi */
        @media (min-width: 768px) {
            header {
                padding: 60px 20px 40px 20px;
            }
            h1 {
                font-size: 3rem;
            }
            h2 {
                font-size: 1.4rem;
            }
        }

        /* Main Container */
        main {
            max-width: 800px;
            width: 100%;
            padding: 0 16px; /* Ridotto per massimizzare lo spazio su schermi piccoli */
            margin-bottom: 40px;
        }

        @media (min-width: 768px) {
            main {
                padding: 0 24px;
                margin-bottom: 60px;
            }
        }

        /* Slider di Immagini Centrale */
        .slider-container {
            position: relative;
            width: 100%;
            height: 250px; /* Perfetto per smartphone */
            margin-bottom: 24px;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--card-border);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
        }

        @media (min-width: 480px) {
            .slider-container {
                height: 320px;
            }
        }

        @media (min-width: 768px) {
            .slider-container {
                height: 400px;
                margin-bottom: 40px;
            }
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.8s ease-in-out, transform 0.8s ease-in-out;
            transform: scale(1.02);
            object-fit: cover;
        }

        .slide.active {
            opacity: 1;
            transform: scale(1);
        }

        /* Indicatori (Puntini in basso allo Slider) */
        .slider-dots {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 10;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.3s ease;
        }

        .dot.active {
            background-color: var(--primary-color);
            transform: scale(1.25);
        }

        /* Card Generica (Descrizione e Audio) */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 20px; /* Più compatto su mobile */
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            margin-bottom: 20px;
            transition: border-color 0.3s ease;
        }

        @media (min-width: 768px) {
            .glass-card {
                padding: 32px;
                margin-bottom: 24px;
            }
        }

        .glass-card:hover {
            border-color: rgba(255, 255, 255, 0.15);
        }

        .glass-card h3 {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 12px;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        @media (min-width: 768px) {
            .glass-card h3 {
                font-size: 1.5rem;
                margin-bottom: 16px;
            }
        }

        .glass-card h3::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 18px;
            background-color: var(--primary-color);
            border-radius: 2px;
        }

        /* Sezione Descrizione */
        #testo-descrizione {
            white-space: pre-line;
            color: var(--text-muted);
            font-size: 0.95rem; /* Testo leggermente più leggibile su mobile */
            line-height: 1.7;
        }

        @media (min-width: 768px) {
            #testo-descrizione {
                font-size: 1.05rem;
                line-height: 1.8;
            }
        }

        /* Sezione Audio & Download */
        .audio-container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        audio {
            width: 100%;
            max-width: 550px;
            margin: 10px 0 20px 0;
            border-radius: 30px;
            filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.3));
        }

        /* Pulsante di Download */
        .download-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: var(--primary-color);
            color: #000000;
            text-decoration: none;
            padding: 12px 28px;
            font-weight: 700;
            font-size: 0.95rem;
            border-radius: 50px;
            width: 100%; /* Occupa tutto lo spazio disponibile su mobile per facilitare il touch */
            max-width: 320px; /* Impedisce che diventi troppo largo su tablet/desktop */
            transition: background-color 0.25s ease, transform 0.2s ease, box-shadow 0.25s ease;
            box-shadow: 0 4px 20px rgba(29, 185, 84, 0.3);
            letter-spacing: 0.5px;
        }

        @media (min-width: 768px) {
            .download-btn {
                padding: 14px 36px;
                font-size: 1rem;
                width: auto;
            }
        }

        .download-btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(29, 185, 84, 0.5);
        }

        .download-btn:active {
            transform: translateY(1px);
        }

        /* Footer */
        footer {
            margin-top: auto;
            padding: 30px 20px;
            color: var(--text-muted);
            font-size: 0.8rem;
            text-align: center;
            width: 100%;
            border-top: 1px solid var(--card-border);
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Trent'Anni</h1>
        <h2>D'aria</h2>
    </header>

    <main>
        <section class="slider-container">
            <img src="immagini/1.jpg" alt="Foto 1 della cantante" class="slide active">
            <img src="immagini/2.jpg" alt="Foto 2 della cantante" class="slide">
            <img src="immagini/3.jpg" alt="Foto 3 della cantante" class="slide">
            
            <div class="slider-dots">
                <span class="dot active" onclick="currentSlide(0)"></span>
                <span class="dot" onclick="currentSlide(1)"></span>
                <span class="dot" onclick="currentSlide(2)"></span>
            </div>
        </section>

        <section class="glass-card">
            <h3>Una breve descrizione</h3>
            <p id="testo-descrizione">Caricamento della descrizione in corso...</p>
        </section>

        <section class="glass-card audio-container">
            <h3>Ascolta l'anteprima</h3>
            <audio controls>
                <source src="audio.mp3" type="audio/mpeg">
                Il tuo browser non supporta l'elemento audio.
            </audio>
            <a href="audio.mp3" download="Nome_Canzone.mp3" class="download-btn">
                Scarica la Canzone (MP3)
            </a>
        </section>
    </main>

    <footer>
        <p>Presentazione realizzata per GitHub Pages &copy; 2026</p>
    </footer>

    <script>
        // Logica dello Slider Autoplay
        let currentIdx = 0;
        const slides = document.querySelectorAll('.slide');
        const dots = document.querySelectorAll('.dot');
        const slideInterval = 4000; // Tempo in millisecondi (4 secondi)
        let autoSlideTimer = setInterval(nextSlide, slideInterval);

        function showSlide(index) {
            slides.forEach(slide => slide.classList.remove('active'));
            dots.forEach(dot => dot.classList.remove('active'));
            
            slides[index].classList.add('active');
            dots[index].classList.add('active');
            currentIdx = index;
        }

        function nextSlide() {
            let nextIdx = (currentIdx + 1) % slides.length;
            showSlide(nextIdx);
        }

        function currentSlide(index) {
            // Ferma temporaneamente l'autoplay quando l'utente clicca manualmente
            clearInterval(autoSlideTimer);
            showSlide(index);
            // Fai ripartire l'autoplay dopo l'interazione manuale
            autoSlideTimer = setInterval(nextSlide, slideInterval);
        }

        // Carica il contenuto di descrizione.txt e lo inserisce nel paragrafo
        fetch('descrizione.txt')
            .then(response => {
                if (!response.ok) {
                    throw new Error('Impossibile caricare il file descrizione.txt');
                }
                return response.text();
            })
            .then(data => {
                document.getElementById('testo-descrizione').textContent = data;
            })
            .catch(error => {
                console.error(error);
                document.getElementById('testo-descrizione').textContent = "Errore nel caricamento della descrizione. Assicurati che il file 'descrizione.txt' sia presente nella cartella principale.";
            });
    </script>

</body>
</html>
