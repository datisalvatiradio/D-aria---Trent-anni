<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presentazione Canzone</title>
    <style>
        /* Reset e Variabili globali */
        :root {
            --bg-color: #0b0c10;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --primary-color: #1db954; /* Verde Spotify */
            --primary-hover: #1ed760;
            --text-main: #f5f5f7;
            --text-muted: #a1a1a6;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top, #1c2a22 0%, #0b0c10 70%);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-font-smoothing: antialiased;
        }

        /* Header */
        header {
            text-align: center;
            padding: 60px 20px 40px 20px;
            width: 100%;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff 0%, #b3b3b3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        h2 {
            font-size: 1.4rem;
            color: var(--primary-color);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Main Container */
        main {
            max-width: 900px;
            width: 100%;
            padding: 0 24px;
            margin-bottom: 60px;
        }

        /* Galleria Immagini */
        .gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        @media (max-width: 768px) {
            .gallery {
                grid-template-columns: 1fr;
                gap: 16px;
            }
        }

        .gallery img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            border-radius: 12px;
            border: 1px solid var(--card-border);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1), 
                        box-shadow 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .gallery img:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 40px rgba(29, 185, 84, 0.15);
            border-color: rgba(29, 185, 84, 0.4);
        }

        /* Card Generica (Descrizione e Audio) */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            margin-bottom: 24px;
            transition: border-color 0.3s ease;
        }

        .glass-card:hover {
            border-color: rgba(255, 255, 255, 0.15);
        }

        .glass-card h3 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 16px;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .glass-card h3::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 20px;
            background-color: var(--primary-color);
            border-radius: 2px;
        }

        /* Sezione Descrizione */
        #testo-descrizione {
            white-space: pre-line;
            color: var(--text-muted);
            font-size: 1.05rem;
            line-height: 1.8;
        }

        /* Sezione Audio & Download */
        .audio-container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        audio {
            width: 100%;
            max-width: 550px;
            margin: 15px 0 25px 0;
            border-radius: 30px;
            filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.3));
        }

        /* Pulsante di Download */
        .download-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: var(--primary-color);
            color: #000000;
            text-decoration: none;
            padding: 14px 36px;
            font-weight: 700;
            font-size: 1rem;
            border-radius: 50px;
            transition: background-color 0.25s ease, transform 0.2s ease, box-shadow 0.25s ease;
            box-shadow: 0 4px 20px rgba(29, 185, 84, 0.3);
            letter-spacing: 0.5px;
        }

        .download-btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(29, 185, 84, 0.5);
        }

        .download-btn:active {
            transform: translateY(1px);
        }

        /* Footer */
        footer {
            margin-top: auto;
            padding: 40px 20px;
            color: var(--text-muted);
            font-size: 0.85rem;
            text-align: center;
            width: 100%;
            border-top: 1px solid var(--card-border);
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Trent'Anni</h1>
        <h2>D'aria</h2>
    </header>

    <main>
        <section class="gallery">
            <img src="immagini/1.jpg" alt="Foto 1 della cantante">
            <img src="immagini/2.jpg" alt="Foto 2 della cantante">
            <img src="immagini/3.jpg" alt="Foto 3 della cantante">
        </section>

        <section class="glass-card">
            <h3> Una breve descrizione </h3>
            <p id="testo-descrizione">Caricamento della descrizione in corso...</p>
        </section>

        <section class="glass-card audio-container">
            <h3> Ascolta l'anteprima</h3>
            <audio controls>
                <source src="audio.mp3" type="audio/mpeg">
                Il tuo browser non supporta l'elemento audio.
            </audio>
            <a href="audio.mp3" download="Nome_Canzone.mp3" class="download-btn">
                Scarica la Canzone (MP3)
            </a>
        </section>
    </main>

    <footer>
        <p>Presentazione realizzata per GitHub Pages &copy; 2026</p>
    </footer>

    <script>
        // Carica il contenuto di descrizione.txt e lo inserisce nel paragrafo
        fetch('descrizione.txt')
            .then(response => {
                if (!response.ok) {
                    throw new Error('Impossibile caricare il file descrizione.txt');
                }
                return response.text();
            })
            .then(data => {
                document.getElementById('testo-descrizione').textContent = data;
            })
            .catch(error => {
                console.error(error);
                document.getElementById('testo-descrizione').textContent = "Errore nel caricamento della descrizione. Assicurati che il file 'descrizione.txt' sia presente nella cartella principale.";
            });
    </script>

</body>
</html>
