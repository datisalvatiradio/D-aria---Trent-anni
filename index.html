<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presentazione Canzone</title>
    <style>
        /* Stili generali */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            background-color: #121212;
            color: #f5f5f5;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(180deg, #1f1f1f 0%, #121212 100%);
            width: 100%;
            box-sizing: border-box;
        }

        h1 {
            margin: 0;
            font-size: 2.5rem;
            color: #1db954; /* Verde stile Spotify */
        }

        h2 {
            margin: 10px 0 0 0;
            font-size: 1.2rem;
            color: #b3b3b3;
            font-weight: 300;
        }

        main {
            max-width: 800px;
            padding: 20px;
            box-sizing: border-box;
            width: 100%;
        }

        /* Galleria Immagini */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
        }

        .gallery img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .gallery img:hover {
            transform: scale(1.03);
        }

        /* Sezione Descrizione */
        .description-container {
            background-color: #181818;
            padding: 25px;
            border-radius: 8px;
            border-left: 5px solid #1db954;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }

        .description-container h3 {
            margin-top: 0;
            color: #1db954;
        }

        #testo-descrizione {
            white-space: pre-line;
            color: #e0e0e0;
        }

        /* Sezione Audio & Download */
        .audio-container {
            background-color: #181818;
            padding: 25px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            margin-bottom: 40px;
        }

        .audio-container h3 {
            margin-top: 0;
            color: #1db954;
            margin-bottom: 20px;
        }

        audio {
            width: 100%;
            max-width: 500px;
            margin-bottom: 20px;
        }

        /* Pulsante di Download */
        .download-btn {
            display: inline-block;
            background-color: #1db954;
            color: #fff;
            text-decoration: none;
            padding: 12px 30px;
            font-weight: bold;
            border-radius: 50px;
            transition: background-color 0.3s ease, transform 0.2s ease;
            box-shadow: 0 4px 15px rgba(29, 185, 84, 0.4);
        }

        .download-btn:hover {
            background-color: #1ed760;
            transform: translateY(-2px);
        }

        .download-btn:active {
            transform: translateY(1px);
        }

        footer {
            margin-top: auto;
            padding: 20px;
            color: #777;
            font-size: 0.9rem;
            text-align: center;
            width: 100%;
        }
    </style>
</head>
<body>

    <header>
        <h1>Titolo della Canzone</h1>
        <h2>Nome della Cantante</h2>
    </header>

    <main>
        <section class="gallery">
            <img src="immagini/1.jpg" alt="Foto 1 della cantante">
            <img src="immagini/2.jpg" alt="Foto 2 della cantante">
            <img src="immagini/3.jpg" alt="Foto 3 della cantante">
        </section>

        <section class="description-container">
            <h3>La Canzone</h3>
            <p id="testo-descrizione">Caricamento della descrizione in corso...</p>
        </section>

        <section class="audio-container">
            <h3>Ascolta l'anteprima</h3>
            <audio controls>
                <source src="audio.mp3" type="audio/mpeg">
                Il tuo browser non supporta l'elemento audio.
            </audio>
            <br>
            <a href="audio.mp3" download="Nome_Canzone.mp3" class="download-btn">
                Scarica la Canzone (MP3)
            </a>
        </section>
    </main>

    <footer>
        <p>Presentazione realizzata per GitHub Pages</p>
    </footer>

    <script>
        // Carica il contenuto di descrizione.txt e lo inserisce nel paragrafo
        fetch('descrizione.txt')
            .then(response => {
                if (!response.ok) {
                    throw new Error('Impossibile caricare il file descrizione.txt');
                }
                return response.text();
            })
            .then(data => {
                document.getElementById('testo-descrizione').textContent = data;
            })
            .catch(error => {
                console.error(error);
                document.getElementById('testo-descrizione').textContent = "Errore nel caricamento della descrizione. Assicurati che il file 'descrizione.txt' sei presente nella cartella principale.";
            });
    </script>

</body>
</html>
